// MODAL WRAPPER
function Modal({onClose,children,width="420px"}){
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(8px)",animation:"fadeIn .15s ease"}}>

// AUTH MODAL
function AuthModal({mode,onClose,onAuth}){
  const [tab,setTab]=useState(mode);
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [name,setName]=useState("");
  const inp={width:"100%",background:"#080b14",border:"1px solid #1e2535",borderRadius:"10px",padding:"12px 14px",color:"#e2e8f0",fontSize:"13px",outline:"none",fontFamily:"inherit",marginBottom:"10px",display:"block"};
  return(
    <Modal onClose={onClose} width="380px">
      <div style={{padding:"28px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"22px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <div style={{width:"26px",height:"26px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:"7px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px"}}>⚡</div>
            <span style={{fontWeight:"800",fontSize:"16px"}}>BuildAI</span>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:"20px",lineHeight:1}}>✕</button>
        </div>
        <div style={{display:"flex",gap:"3px",background:"#080b14",borderRadius:"11px",padding:"3px",marginBottom:"22px"}}>
          {["signin","signup"].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"9px",background:tab===t?"#1e2535":"transparent",border:"none",borderRadius:"9px",color:tab===t?"#e2e8f0":"#475569",fontSize:"13px",fontWeight:tab===t?"600":"400",cursor:"pointer",transition:"all .15s"}}>
              {t==="signin"?"Sign in":"Create account"}
            </button>
          ))}
        </div>
        {tab==="signup"&&<input style={inp} placeholder="Full name" value={name} onChange={e=>setName(e.target.value)}/>}
        <input style={inp} placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)} type="email"/>
        <input style={inp} placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} type="password"/>
        <button onClick={()=>onAuth({name:name||"User",email})} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#4f46e5,#7c3aed)",border:"none",borderRadius:"11px",color:"#fff",fontSize:"14px",fontWeight:"700",cursor:"pointer",marginTop:"4px"}}>
          {tab==="signin"?"Sign in →":"Create free account →"}
        </button>
        <div style={{display:"flex",alignItems:"center",gap:"10px",margin:"18px 0 0"}}>
          <div style={{flex:1,height:"1px",background:"#1e2535"}}/>
          <span style={{fontSize:"11px",color:"#334155"}}>or</span>
          <div style={{flex:1,height:"1px",background:"#1e2535"}}/>
        </div>
        <button style={{width:"100%",padding:"12px",background:"#080b14",border:"1px solid #1e2535",borderRadius:"11px",color:"#94a3b8",fontSize:"13px",cursor:"pointer",marginTop:"14px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",fontFamily:"inherit"}}>
          <span style={{fontSize:"16px"}}>G</span> Continue with Google
        </button>
      </div>
    </Modal>
  );
}

              ))}

            <button onClick={()=>{onConnected();onClose();}} style={{width:"100%",padding:"12px",background:"linear-gradient(135deg,#4f46e5,#7c3aed)",border:"none",borderRadius:"11px",color:"#fff",fontSize:"14px",fontWeight:"700",cursor:"pointer"}}>

function BuilderView({initialPrompt,user,onGoHome,onOpenAuth}){
  const [projects,setProjects]=useState(PAST_PROJECTS);
  const [activeId,setActiveId]=useState(null);
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [generating,setGenerating]=useState(false);
  const [status,setStatus]=useState("");
  const [activeRound,setActiveRound]=useState(0);
  const [doneRounds,setDoneRounds]=useState([]);
  const [code,setCode]=useState("");
  const [tab,setTab]=useState("preview");
  const [viewMode,setViewMode]=useState("desktop");
  const [sidebar,setSidebar]=useState(true);
  const [modal,setModal]=useState(null);
  const [showVersion,setShowVersion]=useState(false);
  const [supaConnected,setSupaConnected]=useState(false);
  const timers=useRef([]);
  const bottomRef=useRef(null);

  useEffect(()=>{if(initialPrompt)setTimeout(()=>run(initialPrompt),300);},[]);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages,generating]);
  const clearTimers=()=>{timers.current.forEach(clearTimeout);timers.current=[];};

  const run=(prompt)=>{
    const text=(prompt||input).trim();if(!text||generating)return;
    setInput("");
    const newP={id:Date.now(),name:text.slice(0,28)+(text.length>28?"...":""),date:"Just now",color:"#6366f1"};
    setProjects(p=>[newP,...p]);setActiveId(newP.id);
    setMessages([{role:"user",text}]);
    setGenerating(true);setCode("");setActiveRound(0);setDoneRounds([]);
    setStatus("Connecting to AI models...");
    clearTimers();
    FLOW.forEach(({delay,round,done,msg})=>{
      const t=setTimeout(()=>{
        setStatus(msg);setActiveRound(round);
        if(done){
          setCode(DEMO_HTML);
          setDoneRounds(p=>[...new Set([...p,round])]);
          if(round===3){
            setGenerating(false);
            setMessages(p=>[...p,{role:"assistant",text:"✅ All 3 rounds complete! Your website is live in the preview →\n\nTry:\n• Preview / Code tabs above\n• Desktop / Tablet / Mobile toggle\n• Connect Supabase for auth & database\n• Share or Publish buttons in the toolbar"}]);
          }
        }
      },delay);
      timers.current.push(t);
    });
  };

  const iframeSrc=code?`data:text/html;charset=utf-8,${encodeURIComponent(code)}`:null;
  const previewW=viewMode==="desktop"?"100%":viewMode==="tablet"?"768px":"375px";

  return(
    <div style={{display:"flex",height:"100vh",background:"#060810",overflow:"hidden",flexDirection:"column"}}>
      {/* TOP BAR */}

        {/* Logo */}

          <div style={{width:"20px",height:"20px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:"5px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px"}}>⚡</div>
          <span style={{fontWeight:"800",fontSize:"12.5px",letterSpacing:"-0.3px"}}>BuildAI</span>
        </div>
        {/* Project name */}
        <div style={{padding:"4px 10px",background:"#0f1322",border:"1px solid #141824",borderRadius:"7px",fontSize:"11.5px",color:"#64748b",cursor:"pointer",maxWidth:"150px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {activeId?projects.find(p=>p.id===activeId)?.name||"New Project":"New Project"}
        </div>
        {/* Version history */}
        <div style={{position:"relative"}}>
          <button onClick={()=>setShowVersion(v=>!v)} style={{padding:"4px 9px",background:showVersion?"#1e2535":"transparent",border:`1px solid ${showVersion?"#2e3a52":"transparent"}`,borderRadius:"6px",color:"#475569",fontSize:"11px",cursor:"pointer",display:"flex",alignItems:"center",gap:"4px",fontFamily:"inherit"}}>
            🕐 History

        </div>

            onMouseEnter={e=>e.currentTarget.style.background="#0f1322"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{ic}</button>

              })}
            </div>
            <div style={{flex:1,fontSize:"10px",color:"#2e3655",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{status||"Ready to build"}</div>
          </div>
          {/* Messages */}
          <div style={{flex:1,overflowY:"auto",padding:"12px",display:"flex",flexDirection:"column",gap:"10px"}}>
            {messages.length===0&&(
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"10px",textAlign:"center",padding:"20px",height:"100%"}}>
                <div style={{fontSize:"32px",animation:"float 3s ease-in-out infinite"}}>🏗️</div>
                <div style={{fontSize:"13px",fontWeight:"600",color:"#475569"}}>What are we building?</div>
                <div style={{fontSize:"11px",color:"#1e2535",lineHeight:"1.7",maxWidth:"200px"}}>Describe your website and watch two AI models build it live.</div>
                <div style={{display:"flex",flexDirection:"column",gap:"5px",width:"100%",marginTop:"4px"}}>
                  {EXAMPLES.slice(0,3).map(e=>(
                    <button key={e.label} onClick={()=>!generating&&run(e.text)} style={{padding:"8px 10px",background:"#0a0d17",border:"1px solid #141824",borderRadius:"8px",color:"#475569",fontSize:"11px",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                      {e.icon} {e.label}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {messages.map((m,i)=>(
              <div key={i} style={{animation:"fadeIn .2s ease",display:"flex",flexDirection:"column",gap:"3px",alignItems:m.role==="user"?"flex-end":"flex-start"}}>
                {m.role==="assistant"&&<div style={{fontSize:"9px",color:"#1e2535",marginLeft:"2px",fontWeight:"700",letterSpacing:"1px"}}>BUILDAI</div>}
                <div style={{maxWidth:"92%",background:m.role==="user"?"linear-gradient(135deg,#4f46e5,#6d28d9)":"#0f1322",border:m.role==="assistant"?"1px solid #141824":"none",borderRadius:m.role==="user"?"13px 13px 3px 13px":"3px 13px 13px 13px",padding:"9px 12px",fontSize:"11.5px",lineHeight:"1.65",whiteSpace:"pre-line",color:m.role==="user"?"#e2e8f0":"#94a3b8"}}>
                  {m.text}
                </div>
              </div>
            ))}
            {generating&&(
              <div style={{display:"flex",flexDirection:"column",gap:"3px",alignItems:"flex-start"}}>
                <div style={{fontSize:"9px",color:"#1e2535",marginLeft:"2px",fontWeight:"700",letterSpacing:"1px"}}>BUILDAI</div>
                <div style={{background:"#0f1322",border:"1px solid #141824",borderRadius:"3px 13px 13px 13px",padding:"10px 14px",display:"flex",gap:"3px",alignItems:"center"}}>
                  {[0,.2,.4].map((d,i)=><span key={i} style={{width:"5px",height:"5px",borderRadius:"50%",background:"#334155",display:"inline-block",animation:`pulse 1.2s ${d}s infinite`}}/>)}
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>
          {/* Quick chips */}
          {code&&!generating&&(
            <div style={{padding:"0 10px 6px",display:"flex",gap:"4px",flexWrap:"wrap"}}>
              {["Add dark mode","Make responsive","Add animations","Fix navigation"].map(s=>(
                <button key={s} onClick={()=>setInput(s)} style={{padding:"4px 8px",background:"#0a0d17",border:"1px solid #141824",borderRadius:"999px",fontSize:"10px",color:"#475569",cursor:"pointer",fontFamily:"inherit"}}>{s}</button>
              ))}
            </div>
          )}
          {/* Input */}
          <div style={{padding:"8px 10px 12px",borderTop:"1px solid #0f1322"}}>
            <div style={{display:"flex",gap:"6px",alignItems:"flex-end"}}>
              <textarea
                style={{flex:1,background:"#0f1322",border:"1px solid #1e2535",borderRadius:"11px",padding:"9px 11px",color:"#e2e8f0",fontSize:"12px",resize:"none",outline:"none",lineHeight:"1.5",fontFamily:"inherit",minHeight:"38px",maxHeight:"90px"}}
                placeholder="Describe your website or a change..."
                value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();run();}}}
                rows={1} disabled={generating}
              />
              <button onClick={()=>run()} disabled={!input.trim()||generating}
                style={{width:"34px",height:"34px",borderRadius:"9px",border:"none",flexShrink:0,background:input.trim()&&!generating?"linear-gradient(135deg,#4f46e5,#7c3aed)":"#1e2535",color:input.trim()&&!generating?"#fff":"#334155",cursor:input.trim()&&!generating?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",transition:"all .2s",fontFamily:"inherit"}}>↑</button>
            </div>
            <div style={{fontSize:"9px",color:"#141824",textAlign:"center",marginTop:"5px"}}>Enter to send · Shift+Enter for new line</div>
          </div>
        </div>

        {/* PREVIEW */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",padding:"0 14px",borderBottom:"1px solid #0f1322",background:"#080b14"}}>
            <div style={{display:"flex"}}>
              {[["preview","🌐 Preview"],["code","</> Code"]].map(([t,l])=>(
                <button key={t} onClick={()=>setTab(t)} style={{padding:"8px 14px",background:"transparent",border:"none",borderBottom:tab===t?"2px solid #6366f1":"2px solid transparent",color:tab===t?"#c4d4f0":"#334155",fontSize:"11.5px",fontWeight:tab===t?"600":"400",cursor:"pointer",marginBottom:"-1px",fontFamily:"inherit"}}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{flex:1}}/>
            {code&&!generating&&(
              <button style={{padding:"5px 11px",background:"transparent",border:"1px solid #141824",borderRadius:"7px",color:"#475569",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>
                ⬇ Download ZIP
              </button>
            )}
          </div>
          <div style={{flex:1,position:"relative",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",background:tab==="preview"?"#1a1c2e":"#060810"}}>
            {tab==="preview"?(
              code?(
                <div style={{width:previewW,height:"100%",transition:"width .3s ease",boxShadow:viewMode!=="desktop"?"0 0 60px rgba(0,0,0,.7)":undefined,borderRadius:viewMode!=="desktop"?"8px":0,overflow:"hidden"}}>
                  <iframe style={{width:"100%",height:"100%",border:"none"}} src={iframeSrc} title="preview" sandbox="allow-scripts"/>
                </div>
              ):(
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"12px",height:"100%"}}>
                  <div style={{fontSize:"64px",opacity:.1,animation:"float 3s ease-in-out infinite"}}>🌐</div>
                  <div style={{fontSize:"15px",fontWeight:"600",color:"#1e2535"}}>Preview will appear here</div>
                  <div style={{fontSize:"12px",color:"#141824"}}>Describe what to build in the chat →</div>
                </div>
              )
            ):(
              <div style={{width:"100%",height:"100%",overflowY:"auto"}}>
                {code?(
                  <pre style={{margin:0,padding:"22px",fontSize:"11px",lineHeight:"1.85",color:"#3d5473",fontFamily:"'Fira Code',monospace",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{code}</pre>
                ):(
                  <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"10px"}}>
                    <div style={{fontSize:"48px",opacity:.1}}>📝</div>
                    <div style={{fontSize:"13px",color:"#1e2535"}}>No code yet</div>
                  </div>
                )}
              </div>
            )}
            {generating&&(
              <div style={{position:"absolute",inset:0,background:"rgba(6,8,16,.92)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"16px",backdropFilter:"blur(8px)"}}>
                <div style={{width:"48px",height:"48px",borderRadius:"50%",border:"3px solid #1e2535",borderTop:"3px solid #6366f1",animation:"spin .8s linear infinite"}}/>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:"13px",color:"#475569",marginBottom:"4px"}}>{status}</div>
                  <div style={{fontSize:"11px",color:"#1e2535"}}>Usually 8–15 seconds</div>
                </div>
                {code&&<div style={{padding:"7px 16px",background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.2)",borderRadius:"999px",fontSize:"11px",color:"#6366f1"}}>Updating preview...</div>}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* MODALS */}
      {modal==="supabase"&&<SupabaseModal onClose={()=>setModal(null)} onConnected={()=>setSupaConnected(true)}/>}
      {modal==="share"&&<ShareModal onClose={()=>setModal(null)}/>}
      {modal==="publish"&&<PublishModal onClose={()=>setModal(null)}/>}
    </div>
  );
}

// ROOT
function Root(){
  const [view,setView]=useState("home");
  const [prompt,setPrompt]=useState("");
  const [user,setUser]=useState(null);
  const [authModal,setAuthModal]=useState(null);
  const goBuilder=(p)=>{setPrompt(p);setView("builder");};
  const handleAuth=(u)=>{setUser(u);setAuthModal(null);if(view==="home")goBuilder("");};
  return(
    <>
      {view==="home"
        ?<HomePage onStart={goBuilder} onOpenAuth={setAuthModal} user={user}/>
        :<BuilderView initialPrompt={prompt} user={user} onGoHome={()=>setView("home")} onOpenAuth={setAuthModal}/>
      }
      {authModal&&<AuthModal mode={authModal} onClose={()=>setAuthModal(null)} onAuth={handleAuth}/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
