// ── BUILDER VIEW ──────────────────────────────────────────────────────────────
function BuilderView({initialPrompt,user,onGoHome,onOpenAuth}){
  const [projects,setProjects]=useState(PAST_PROJECTS);
  const [activeId,setActiveId]=useState(null);
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [generating,setGenerating]=useState(false);
  const [status,setStatus]=useState("");
  const [activeRound,setActiveRound]=useState(0);
  const [doneRounds,setDoneRounds]=useState([]);
  const [code,setCode]=useState("");
  const [tab,setTab]=useState("preview");
  const [viewMode,setViewMode]=useState("desktop");
  const [sidebar,setSidebar]=useState(true);
  const [modal,setModal]=useState(null);
  const [showVersion,setShowVersion]=useState(false);
  const [supaConnected,setSupaConnected]=useState(false);
  const [visualEdits,setVisualEdits]=useState(false);
  const [thinkingMsg,setThinkingMsg]=useState(null);
  const timers=useRef([]);
  const bottomRef=useRef(null);

  useEffect(()=>{if(initialPrompt)setTimeout(()=>run(initialPrompt),200);},[]);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages,generating,thinkingMsg]);
  const clearTimers=()=>{timers.current.forEach(clearTimeout);timers.current=[];};

  const run=(prompt)=>{
    const text=(prompt||input).trim();if(!text||generating)return;
    setInput("");
    const newP={id:Date.now(),name:text.slice(0,26)+(text.length>26?"...":""),date:"Just now",color:"#6366f1"};
    setProjects(p=>[newP,...p]);setActiveId(newP.id);
    setMessages([{role:"user",text}]);
    setGenerating(true);setCode("");setActiveRound(0);setDoneRounds([]);setThinkingMsg(null);
    setStatus("Connecting to AI models...");
    clearTimers();
    FLOW.forEach(({delay,type,round,done,msg})=>{
      const t=setTimeout(()=>{
        if(type==="thinking"){setThinkingMsg(true);}
        else if(type==="thinking_done"){setThinkingMsg(false);}
        else{
          setStatus(msg);setActiveRound(round);
          if(done){
            setCode(DEMO_HTML);
            setDoneRounds(p=>[...new Set([...p,round])]);
            if(round===3){
              setGenerating(false);setThinkingMsg(null);
              setMessages(p=>[...p,{role:"assistant",thinking:THINKING_STEPS,card:"Design a vibrant SaaS site",text:"Created a vibrant AI-powered SaaS landing page using your stunning color palette! Features hero section with animated gradient effects, feature cards, pricing tiers, and CTAs — all with glowing neon accents on a dark background.",next:["Refine & Customize: Tweak colors, animations, and content via prompts or visual edits.","Master Prompting: Use 'chat mode' to plan features before implementing them."],promo:"Need backend features like user authentication, data storage, or API integrations?"}]);
            }
          }
        }
      },delay);
      timers.current.push(t);
    });
  };

  const iframeSrc=code?`data:text/html;charset=utf-8,${encodeURIComponent(code)}`:null;
  const previewW=viewMode==="desktop"?"100%":viewMode==="tablet"?"768px":"390px";
  const activeName=activeId?projects.find(p=>p.id===activeId)?.name||"New Project":"New Project";

  return(
    <div style={{display:"flex",height:"100vh",flexDirection:"column",background:"#0a0a0f",overflow:"hidden"}}>

      {/* ══ TOP BAR — exactly like Lovable ══ */}
      <div style={{height:"40px",display:"flex",alignItems:"center",padding:"0 8px",borderBottom:"1px solid #1a1d27",background:"#0d0f17",flexShrink:0,gap:"4px",zIndex:100}}>

        {/* Logo + project name */}
        <div style={{display:"flex",alignItems:"center",gap:"0",marginRight:"4px"}}>
          <div onClick={onGoHome} style={{display:"flex",alignItems:"center",gap:"6px",cursor:"pointer",padding:"4px 8px",borderRadius:"7px"}} onMouseEnter={e=>e.currentTarget.style.background="#161922"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <div style={{width:"18px",height:"18px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:"4px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px"}}>⚡</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"5px",padding:"4px 9px",background:"#161922",border:"1px solid #1e2535",borderRadius:"8px",cursor:"pointer",maxWidth:"180px"}}>
            <span style={{fontSize:"11.5px",color:"#94a3b8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{activeName}</span>
            <span style={{fontSize:"9px",color:"#475569"}}>▾</span>
          </div>
        </div>

        {/* Left tools */}
        <div style={{display:"flex",alignItems:"center",gap:"1px"}}>
          {/* Back/forward */}
          {["←","→"].map((ic,i)=>(
            <button key={i} title={i===0?"Back":"Forward"} style={{width:"26px",height:"26px",background:"transparent",border:"none",borderRadius:"6px",color:"#334155",cursor:"pointer",fontSize:"13px",fontFamily:"inherit"}} onMouseEnter={e=>e.currentTarget.style.background="#161922"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{ic}</button>
          ))}
          {/* Undo/Redo */}
          {["↩","↪"].map((ic,i)=>(
            <button key={i} style={{width:"26px",height:"26px",background:"transparent",border:"none",borderRadius:"6px",color:"#334155",cursor:"pointer",fontSize:"12px",fontFamily:"inherit"}} onMouseEnter={e=>e.currentTarget.style.background="#161922"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{ic}</button>

        </div>

          <button onClick={()=>setSidebar(true)} style={{position:"absolute",left:0,top:"50%",transform:"translateY(-50%)",zIndex:50,background:"#161922",border:"1px solid #1e2535",borderTopRightRadius:"7px",borderBottomRightRadius:"7px",color:"#475569",cursor:"pointer",padding:"8px 5px",fontSize:"11px",marginTop:"20px",fontFamily:"inherit"}}>›</button>
        )}

        {/* ══ CHAT ══ */}
        <div style={{width:"300px",flexShrink:0,display:"flex",flexDirection:"column",borderRight:"1px solid #1a1d27",background:"#0d0f17"}}>
          {/* Round indicator */}
          <div style={{padding:"6px 12px",borderBottom:"1px solid #1a1d27",display:"flex",alignItems:"center",gap:"6px",background:"#0a0c14"}}>
            <div style={{display:"flex",gap:"3px"}}>
              {[1,2,3].map(r=>{
                const isA=activeRound===r&&generating,isDone=doneRounds.includes(r);
                return <div key={r} style={{width:"18px",height:"18px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"7px",fontWeight:"700",border:"1px solid",borderColor:isDone?"#6366f1":isA?"#8b5cf6":"#1e2535",background:isDone?"#6366f1":isA?"rgba(139,92,246,.2)":"transparent",color:isDone||isA?"#fff":"#334155",transition:"all .3s"}}>{isDone?"✓":r}</div>;
              })}
            </div>
            <div style={{flex:1,fontSize:"9.5px",color:"#334155",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{status||"Ready"}</div>
          </div>

          {/* Messages */}
          <div style={{flex:1,overflowY:"auto",padding:"10px",display:"flex",flexDirection:"column",gap:"10px"}}>
            {messages.length===0&&!generating&&(
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"10px",textAlign:"center",padding:"24px 12px",height:"100%"}}>
                <div style={{fontSize:"32px",animation:"float 3s ease-in-out infinite"}}>🏗️</div>
                <div style={{fontSize:"13px",fontWeight:"600",color:"#475569"}}>What are we building?</div>
                <div style={{fontSize:"11px",color:"#1e2535",lineHeight:"1.7",maxWidth:"200px"}}>Describe your website and two AI models will build it live in real-time.</div>
                <div style={{display:"flex",flexDirection:"column",gap:"5px",width:"100%",marginTop:"4px"}}>
                  {EXAMPLES.slice(0,3).map(e=>(
                    <button key={e.label} onClick={()=>!generating&&run(e.text)} style={{padding:"8px 10px",background:"#10141e",border:"1px solid #1a1d27",borderRadius:"8px",color:"#475569",fontSize:"11px",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                      {e.icon} {e.label}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {messages.map((m,i)=>(
              <div key={i} style={{animation:"fadeIn .2s ease"}}>
                {m.role==="user"?(
                  <div style={{display:"flex",justifyContent:"flex-end"}}>
                    <div style={{maxWidth:"90%",background:"linear-gradient(135deg,#4f46e5,#6d28d9)",borderRadius:"13px 13px 3px 13px",padding:"10px 13px",fontSize:"12px",lineHeight:"1.65",color:"#e2e8f0"}}>
                      {m.text}
                    </div>
                  </div>
                ):(
                  <div>
                    {/* AI Thinking block — like Lovable */}
                    {m.thinking&&(
                      <div style={{background:"#10141e",border:"1px solid #1a2035",borderRadius:"10px",padding:"12px 14px",marginBottom:"8px",fontSize:"11.5px",color:"#64748b",lineHeight:"1.75"}}>
                        <div style={{fontSize:"10px",color:"#4f46e5",fontWeight:"700",marginBottom:"8px",display:"flex",alignItems:"center",gap:"6px"}}>
                          <span style={{animation:"pulseOp 1.5s infinite",display:"inline-block"}}>●</span> Thought for 28s
                        </div>
                        {m.thinking.map((t,i)=>(
                          <div key={i} style={{color:t.startsWith("•")?"#4f6080":"#475569",fontWeight:t==="Design approach:"?"600":"400",marginTop:t==="Design approach:"?"6px":"0"}}>{t}</div>
                        ))}
                      </div>
                    )}
                    {/* Card like Lovable */}
                    {m.card&&(
                      <div style={{background:"#10141e",border:"1px solid #1a2035",borderRadius:"10px",marginBottom:"8px",overflow:"hidden"}}>
                        <div style={{padding:"10px 12px",borderBottom:"1px solid #1a2035",fontSize:"12px",fontWeight:"500",color:"#94a3b8"}}>{m.card}</div>
                        <div style={{display:"flex",borderBottom:"1px solid #1a2035"}}>
                          {["Details","Preview"].map((t,i)=>(
                            <button key={t} style={{flex:1,padding:"8px",background:i===1?"#161c2e":"transparent",border:"none",color:i===1?"#818cf8":"#475569",fontSize:"11px",fontWeight:i===1?"600":"400",cursor:"pointer",fontFamily:"inherit"}}>{t}</button>
                          ))}
                        </div>
                      </div>
                    )}
                    {/* Main text */}
                    <div style={{fontSize:"12px",color:"#94a3b8",lineHeight:"1.7",marginBottom:"8px",whiteSpace:"pre-line"}}>
                      {m.text}
                    </div>
                    {/* What's next */}
                    {m.next&&(
                      <div style={{marginBottom:"8px"}}>
                        <div style={{fontSize:"11px",fontWeight:"600",color:"#64748b",marginBottom:"6px"}}>What's next?</div>
                        {m.next.map((n,i)=>(
                          <div key={i} style={{fontSize:"11px",color:"#4f6080",marginBottom:"4px",paddingLeft:"8px",borderLeft:"2px solid #1e2535",lineHeight:"1.6"}}>
                            <span style={{color:"#6366f1",fontWeight:"600"}}>{n.split(":")[0]}:</span>{n.slice(n.indexOf(":"))}
                          </div>
                        ))}
                      </div>
                    )}
                    {/* Promo like "Lovable Cloud" */}
                    {m.promo&&(
                      <div style={{background:"rgba(99,102,241,.06)",border:"1px solid rgba(99,102,241,.15)",borderRadius:"9px",padding:"10px 12px",fontSize:"11px",color:"#64748b",lineHeight:"1.65"}}>
                        {m.promo} <span style={{color:"#818cf8",cursor:"pointer",textDecoration:"underline"}}>Connect Supabase</span> makes it simple to add these without complex setup.
                      </div>
                    )}
                    {/* Action buttons */}
                    {m.text&&(
                      <div style={{display:"flex",gap:"5px",marginTop:"8px",flexWrap:"wrap"}}>
                        <button style={{padding:"5px 10px",background:"#10141e",border:"1px solid #1a2035",borderRadius:"7px",color:"#475569",fontSize:"10.5px",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"4px"}}>↗ Visit docs</button>
                        <button onClick={()=>setModal("supabase")} style={{padding:"5px 10px",background:"#10141e",border:"1px solid #1a2035",borderRadius:"7px",color:"#475569",fontSize:"10.5px",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"4px"}}>🗄️ Connect Supabase</button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}

            {/* Thinking animation while generating */}
            {generating&&thinkingMsg===true&&(
              <div style={{background:"#10141e",border:"1px solid #1a2035",borderRadius:"10px",padding:"12px 14px"}}>
                <div style={{fontSize:"10px",color:"#4f46e5",fontWeight:"700",marginBottom:"6px",display:"flex",alignItems:"center",gap:"6px"}}>
                  <span style={{animation:"pulseOp 1s infinite",display:"inline-block"}}>●</span> Thinking...
                </div>
                <div style={{background:"#1a1d27",borderRadius:"4px",height:"3px",overflow:"hidden"}}>
                  <div style={{height:"100%",background:"linear-gradient(90deg,#6366f1,#8b5cf6)",animation:"thinking 2s ease-in-out infinite",width:"60%"}}/>
                </div>
              </div>
            )}
            {generating&&thinkingMsg===false&&(
              <div style={{display:"flex",gap:"3px",padding:"10px 14px",background:"#10141e",border:"1px solid #1a2035",borderRadius:"10px",alignItems:"center"}}>
                {[0,.15,.3].map((d,i)=><span key={i} style={{width:"5px",height:"5px",borderRadius:"50%",background:"#334155",display:"inline-block",animation:`pulseOp 1.2s ${d}s infinite`}}/>)}
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* Suggestion chips — exactly like Lovable bottom */}
          {code&&!generating&&(
            <div style={{padding:"6px 10px",borderTop:"1px solid #1a1d27",display:"flex",gap:"5px",overflowX:"auto"}}>
              {SUGGESTIONS.map(s=>(
                <button key={s} onClick={()=>setInput(s)} style={{padding:"5px 10px",background:"#10141e",border:"1px solid #1a2035",borderRadius:"999px",fontSize:"10px",color:"#475569",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{s}</button>
              ))}
            </div>
          )}

          {/* Input area */}
          <div style={{padding:"8px 10px 10px",borderTop:"1px solid #1a1d27",background:"#0a0c14"}}>
            <div style={{display:"flex",gap:"5px",alignItems:"flex-end"}}>
              <textarea
                style={{flex:1,background:"#10141e",border:"1px solid #1e2535",borderRadius:"11px",padding:"9px 11px",color:"#e2e8f0",fontSize:"12px",resize:"none",outline:"none",lineHeight:"1.5",fontFamily:"inherit",minHeight:"38px",maxHeight:"80px"}}
                placeholder={`Ask Lovable...`}
                value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();run();}}}
                rows={1} disabled={generating}
              />
              <button onClick={()=>run()} disabled={!input.trim()||generating}
                style={{width:"34px",height:"34px",borderRadius:"9px",border:"none",flexShrink:0,background:input.trim()&&!generating?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#1e2535",color:input.trim()&&!generating?"#fff":"#334155",cursor:input.trim()&&!generating?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontFamily:"inherit"}}>↑</button>
            </div>
            {/* Visual edits toggle — like Lovable */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:"8px"}}>
              <button onClick={()=>setVisualEdits(v=>!v)} style={{display:"flex",alignItems:"center",gap:"6px",padding:"4px 9px",background:visualEdits?"rgba(99,102,241,.12)":"transparent",border:`1px solid ${visualEdits?"rgba(99,102,241,.3)":"transparent"}`,borderRadius:"7px",color:visualEdits?"#818cf8":"#475569",fontSize:"10.5px",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>
                <span style={{fontSize:"11px"}}>🎨</span> Visual edits {visualEdits?"ON":""}
              </button>
              <div style={{display:"flex",gap:"3px"}}>
                <button style={{padding:"4px 8px",background:"transparent",border:"1px solid transparent",borderRadius:"6px",color:"#475569",fontSize:"10.5px",cursor:"pointer",fontFamily:"inherit"}}>Plan</button>
                <button style={{width:"24px",height:"24px",background:"transparent",border:"none",color:"#475569",cursor:"pointer",fontSize:"12px",display:"flex",alignItems:"center",justifyContent:"center"}}>📎</button>
              </div>
            </div>
          </div>
        </div>

        {/* ══ PREVIEW ══ */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"#060810"}}>
          {/* Published status bar */}
          {code&&!generating&&(
            <div style={{padding:"3px 14px",background:"#0d0f17",borderBottom:"1px solid #1a1d27",display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"10px",color:"#334155"}}>Previewing last saved version</span>
              <span style={{width:"5px",height:"5px",borderRadius:"50%",background:"#10b981",display:"inline-block"}}/>
              <span style={{fontSize:"10px",color:"#10b981"}}>Published</span>
              <span style={{fontSize:"10px",color:"#1e2535",marginLeft:"auto"}}>Just now</span>
            </div>
          )}

          {/* Content */}
          <div style={{flex:1,position:"relative",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",background:tab==="preview"?"#1a1c2a":"#060810"}}>
            {tab==="preview"?(
              code?(
                <div style={{width:previewW,height:"100%",transition:"width .3s",boxShadow:viewMode!=="desktop"?"0 0 60px rgba(0,0,0,.8)":undefined,borderRadius:viewMode!=="desktop"?"10px":0,overflow:"hidden"}}>
                  <iframe style={{width:"100%",height:"100%",border:"none"}} src={iframeSrc} title="preview" sandbox="allow-scripts"/>
                </div>
              ):(
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"14px",height:"100%",color:"#1e2535"}}>
                  <div style={{fontSize:"60px",opacity:.12,animation:"float 3s ease-in-out infinite"}}>🌐</div>
                  <div style={{fontSize:"15px",fontWeight:"600",color:"#1e2535"}}>Preview will appear here</div>
                  <div style={{fontSize:"12px",color:"#141824"}}>Describe your website in the chat →</div>
                </div>
              )
            ):tab==="code"?(
              <div style={{width:"100%",height:"100%",overflowY:"auto"}}>
                {code?(
                  <pre style={{margin:0,padding:"22px",fontSize:"11px",lineHeight:"1.85",color:"#3d5473",fontFamily:"'Fira Code',monospace",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{code}</pre>
                ):(
                  <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"10px",color:"#1e2535"}}>
                    <div style={{fontSize:"40px",opacity:.1}}>📝</div>
                    <div style={{fontSize:"13px"}}>No code yet</div>
                  </div>
                )}
              </div>
            ):(
              <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",background:"#060810"}}>
                <div style={{padding:"10px 16px",borderBottom:"1px solid #1a1d27",fontSize:"11px",color:"#334155",fontFamily:"'Fira Code',monospace"}}>Console</div>
                <div style={{flex:1,padding:"14px 16px",fontFamily:"'Fira Code',monospace",fontSize:"11px",color:"#475569"}}>
                  {code&&<div style={{color:"#10b981"}}>✓ Website loaded successfully</div>}
                  {!code&&<div style={{color:"#334155"}}>Waiting for build...</div>}
                </div>
              </div>
            )}

            {generating&&(
              <div style={{position:"absolute",inset:0,background:"rgba(6,8,16,.92)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"16px",backdropFilter:"blur(8px)"}}>
                <div style={{width:"48px",height:"48px",borderRadius:"50%",border:"3px solid #1e2535",borderTop:"3px solid #6366f1",animation:"spin .8s linear infinite"}}/>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:"13px",color:"#475569",marginBottom:"4px"}}>{status}</div>
                  <div style={{fontSize:"11px",color:"#1e2535"}}>Usually 8–15 seconds</div>
                </div>
                {code&&<div style={{padding:"7px 16px",background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.2)",borderRadius:"999px",fontSize:"11px",color:"#6366f1"}}>Loading your page...</div>}
              </div>
            )}
          </div>

          {/* Download bar */}
          {code&&!generating&&(
            <div style={{padding:"6px 14px",borderTop:"1px solid #1a1d27",background:"#0d0f17",display:"flex",alignItems:"center",gap:"8px"}}>
              <button style={{padding:"5px 12px",background:"#161922",border:"1px solid #1e2535",borderRadius:"7px",color:"#64748b",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>⬇ Download ZIP</button>
              <div style={{flex:1}}/>
              <span style={{fontSize:"10px",color:"#1e2535"}}>Make lightweight changes, quickly.</span>
            </div>
          )}
        </div>
      </div>

      {/* MODALS */}
      {modal==="supabase"&&<SupabaseModal onClose={()=>setModal(null)} onConnected={()=>setSupaConnected(true)}/>}
      {modal==="share"&&<ShareModal onClose={()=>setModal(null)}/>}
      {modal==="publish"&&<PublishModal onClose={()=>setModal(null)}/>}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function Root(){
  const [view,setView]=useState("home");
  const [prompt,setPrompt]=useState("");
  const [user,setUser]=useState(null);
  const [authModal,setAuthModal]=useState(null);
  const goBuilder=(p)=>{setPrompt(p);setView("builder");};
  const handleAuth=(u)=>{setUser(u);setAuthModal(null);if(view==="home")goBuilder("");};
  return(
    <>
      {view==="home"
        ?<HomePage onStart={goBuilder} onOpenAuth={setAuthModal} user={user}/>
        :<BuilderView initialPrompt={prompt} user={user} onGoHome={()=>setView("home")} onOpenAuth={setAuthModal}/>
      }
      {authModal&&<AuthModal mode={authModal} onClose={()=>setAuthModal(null)} onAuth={handleAuth}/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
