// ─── BUILDER VIEW ─────────────────────────────────────────────────────────────
function BuilderView({ initialPrompt, onGoHome }) {
  const [projects, setProjects]     = useState(PAST_PROJECTS);
  const [activeProject, setActive]  = useState(null);
  const [messages, setMessages]     = useState([]);
  const [input, setInput]           = useState("");
  const [generating, setGenerating] = useState(false);
  const [status, setStatus]         = useState("");
  const [activeRound, setActiveRound] = useState(0);
  const [doneRounds, setDoneRounds] = useState([]);
  const [code, setCode]             = useState("");
  const [tab, setTab]               = useState("preview");
  const [sidebarOpen, setSidebar]   = useState(true);
  const timers = useRef([]);
  const bottomRef = useRef(null);

  useEffect(()=>{
    if(initialPrompt) setTimeout(()=>run(initialPrompt), 300);
  },[]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages,generating]);

  const clearTimers = ()=>{ timers.current.forEach(clearTimeout); timers.current=[]; };

  const run = (prompt)=>{
    const text = (prompt||input).trim();
    if(!text||generating) return;
    setInput("");
    const newProject = { id: Date.now(), name: text.slice(0,32)+(text.length>32?"...":""), date:"Just now", msgs:1, preview:"#4f46e5" };
    setProjects(prev=>[newProject,...prev]);
    setActive(newProject.id);
    setMessages([{role:"user",text}]);
    setGenerating(true);
    setCode(""); setActiveRound(0); setDoneRounds([]);
    setStatus("Connecting to AI models...");
    clearTimers();
    FLOW.forEach(({delay,round,done,msg})=>{
      const t = setTimeout(()=>{
        setStatus(msg);
        setActiveRound(round);
        if(done){
          setCode(DEMO_HTML);
          setDoneRounds(prev=>[...new Set([...prev,round])]);
          if(round===3){
            setGenerating(false);
            setMessages(prev=>[...prev,{role:"assistant",text:"✅ All 3 rounds complete! Your website is live in the preview →\n\nClick the Preview tab to see it, or Code tab to view the generated HTML. You can also download it as a ZIP."}]);
          }
        }
      },delay);
      timers.current.push(t);
    });
  };

  const iframeSrc = code ? `data:text/html;charset=utf-8,${encodeURIComponent(code)}` : null;

  return (
    <div style={{display:"flex",height:"100vh",background:"#060810",overflow:"hidden"}}>

      {/* ══ SIDEBAR ══ */}
      {sidebarOpen && (
        <div style={{width:"240px",flexShrink:0,display:"flex",flexDirection:"column",background:"#080b14",borderRight:"1px solid #0f1322"}}>
          {/* Logo */}
          <div style={{padding:"14px 16px",borderBottom:"1px solid #0f1322",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px",cursor:"pointer"}} onClick={onGoHome}>
              <div style={{width:"24px",height:"24px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:"6px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px"}}>⚡</div>
              <span style={{fontWeight:"800",fontSize:"13.5px",letterSpacing:"-0.3px"}}>BuildAI</span>
            </div>
            <button onClick={()=>setSidebar(false)} style={{background:"none",border:"none",color:"#3d4663",cursor:"pointer",fontSize:"16px",lineHeight:1}}>‹</button>
          </div>

          {/* New project btn */}
          <div style={{padding:"10px 12px",borderBottom:"1px solid #0f1322"}}>
            <button onClick={()=>{setMessages([]);setCode("");setActive(null);setStatus("");setActiveRound(0);setDoneRounds([]);}}
              style={{width:"100%",padding:"8px",background:"#0f1322",border:"1px dashed #1e2535",borderRadius:"9px",color:"#64748b",fontSize:"12px",cursor:"pointer",display:"flex",alignItems:"center",gap:"7px",justifyContent:"center",fontFamily:"inherit"}}>
              ＋ New Project
            </button>
          </div>

          {/* Projects list */}
          <div style={{flex:1,overflowY:"auto",padding:"8px"}}>
            <div style={{fontSize:"10px",fontWeight:"600",color:"#2e3655",textTransform:"uppercase",letterSpacing:"1px",padding:"6px 8px 4px"}}>Recent Projects</div>
            {projects.map(p=>(
              <div key={p.id} onClick={()=>setActive(p.id)}
                style={{padding:"9px 10px",borderRadius:"9px",cursor:"pointer",marginBottom:"2px",background:activeProject===p.id?"#0f1a2e":"transparent",border:activeProject===p.id?"1px solid #1e3a5f":"1px solid transparent",transition:"all .15s"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <div style={{width:"8px",height:"8px",borderRadius:"50%",background:p.preview,flexShrink:0}}/>
                  <div style={{flex:1,overflow:"hidden"}}>
                    <div style={{fontSize:"12px",fontWeight:"500",color:activeProject===p.id?"#c4d4f0":"#94a3b8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
                    <div style={{fontSize:"10px",color:"#2e3655",marginTop:"1px"}}>{p.date} · {p.msgs} messages</div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Bottom */}
          <div style={{padding:"10px 12px",borderTop:"1px solid #0f1322"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 10px",borderRadius:"9px",background:"#0f1322",cursor:"pointer"}}>
              <div style={{width:"26px",height:"26px",background:"linear-gradient(135deg,#4f46e5,#7c3aed)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"700"}}>U</div>
              <div>
                <div style={{fontSize:"12px",fontWeight:"600",color:"#c4d4f0"}}>User</div>
                <div style={{fontSize:"10px",color:"#3d4663"}}>Free plan</div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Sidebar toggle when closed */}
      {!sidebarOpen && (
        <button onClick={()=>setSidebar(true)} style={{position:"absolute",left:"8px",top:"50%",transform:"translateY(-50%)",zIndex:50,background:"#0f1322",border:"1px solid #1e2535",borderRadius:"8px",color:"#64748b",cursor:"pointer",padding:"8px 6px",fontSize:"14px"}}>›</button>
      )}

      {/* ══ CHAT ══ */}
      <div style={{width:"340px",flexShrink:0,display:"flex",flexDirection:"column",borderRight:"1px solid #0f1322",background:"#080b14"}}>
        {/* Chat header */}
        <div style={{padding:"12px 16px",borderBottom:"1px solid #0f1322",display:"flex",alignItems:"center",gap:"8px"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:"13px",fontWeight:"600",color:"#c4d4f0"}}>
              {activeProject ? projects.find(p=>p.id===activeProject)?.name || "New Project" : "New Project"}
            </div>
            <div style={{fontSize:"10px",color:"#2e3655",marginTop:"1px"}}>Gemini × OpenRouter · 3-round review</div>
          </div>
        </div>

        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"14px",display:"flex",flexDirection:"column",gap:"12px"}}>
          {messages.length===0 && (
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"12px",padding:"20px",textAlign:"center",height:"100%"}}>
              <div style={{fontSize:"36px",animation:"float 3s ease-in-out infinite"}}>🏗️</div>
              <div style={{fontSize:"14px",fontWeight:"600",color:"#94a3b8"}}>What are we building?</div>
              <div style={{fontSize:"11.5px",color:"#334155",lineHeight:"1.7",maxWidth:"220px"}}>Describe your website below. Two AI models will build and review it for you.</div>
            </div>
          )}
          {messages.map((m,i)=>(
            <div key={i} style={{animation:"fadeIn .2s ease",display:"flex",flexDirection:"column",gap:"3px",alignItems:m.role==="user"?"flex-end":"flex-start"}}>
              {m.role==="assistant"&&<div style={{fontSize:"10px",color:"#2e3655",marginLeft:"2px"}}>BuildAI</div>}
              <div style={{maxWidth:"90%",background:m.role==="user"?"linear-gradient(135deg,#4f46e5,#6d28d9)":"#0f1322",border:m.role==="assistant"?"1px solid #1e2535":"none",borderRadius:m.role==="user"?"14px 14px 3px 14px":"3px 14px 14px 14px",padding:"10px 13px",fontSize:"12.5px",lineHeight:"1.65",whiteSpace:"pre-line"}}>
                {m.text}
              </div>
            </div>
          ))}
          {generating && (
            <div style={{display:"flex",flexDirection:"column",gap:"3px",alignItems:"flex-start"}}>
              <div style={{fontSize:"10px",color:"#2e3655",marginLeft:"2px"}}>BuildAI</div>
              <div style={{background:"#0f1322",border:"1px solid #1e2535",borderRadius:"3px 14px 14px 14px",padding:"10px 14px",fontSize:"12px",color:"#4f6080"}}>
                <span style={{animation:"pulse 1.2s infinite",display:"inline-block"}}>●</span>
                <span style={{animation:"pulse 1.2s .2s infinite",display:"inline-block",margin:"0 2px"}}>●</span>
                <span style={{animation:"pulse 1.2s .4s infinite",display:"inline-block"}}>●</span>
              </div>
            </div>
          )}
          <div ref={bottomRef}/>
        </div>

        {/* Input */}
        <div style={{padding:"10px 14px 14px",borderTop:"1px solid #0f1322"}}>
          <div style={{display:"flex",gap:"7px",alignItems:"flex-end"}}>
            <textarea
              style={{flex:1,background:"#0f1322",border:"1px solid #1e2535",borderRadius:"12px",padding:"10px 13px",color:"#e2e8f0",fontSize:"12.5px",resize:"none",outline:"none",lineHeight:"1.5",fontFamily:"inherit",minHeight:"42px",maxHeight:"120px"}}
              placeholder="Describe your website or request changes..."
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();run();}}}
              rows={1}
              disabled={generating}
            />
            <button onClick={()=>run()} disabled={!input.trim()||generating}
              style={{width:"40px",height:"40px",borderRadius:"11px",border:"none",flexShrink:0,background:input.trim()&&!generating?"linear-gradient(135deg,#4f46e5,#7c3aed)":"#1e2535",color:input.trim()&&!generating?"#fff":"#2e3655",cursor:input.trim()&&!generating?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",transition:"all .2s"}}>↑</button>
          </div>
          <div style={{fontSize:"10px",color:"#1e2535",textAlign:"center",marginTop:"6px"}}>Enter to send · Shift+Enter for new line</div>
        </div>
      </div>

      {/* ══ PREVIEW ══ */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Status bar */}
        <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 18px",borderBottom:"1px solid #0f1322",background:"#080b14",minHeight:"44px"}}>
          <div style={{display:"flex",gap:"5px",flexShrink:0}}>
            {[1,2,3].map(r=>{
              const isActive = activeRound===r && generating;
              const isDone   = doneRounds.includes(r);
              return (
                <div key={r} title={`Round ${r}`} style={{width:"22px",height:"22px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",fontWeight:"700",border:"1px solid",borderColor:isDone?"#4f46e5":isActive?"#7c3aed":"#1e2535",background:isDone?"#4f46e5":isActive?"rgba(124,58,237,0.2)":"transparent",color:isDone||isActive?"#e2e8f0":"#2e3655",transition:"all .3s"}}>
                  {isDone?"✓":r}
                </div>
              );
            })}
          </div>
          <div style={{flex:1,fontSize:"11.5px",color:"#475569",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {status||"Waiting for your prompt..."}
          </div>
          <div style={{display:"flex",gap:"6px",flexShrink:0}}>
            {code&&!generating&&(
              <button style={{padding:"6px 13px",background:"linear-gradient(135deg,#059669,#10b981)",border:"none",borderRadius:"8px",color:"#fff",fontSize:"11px",fontWeight:"600",cursor:"pointer",display:"flex",alignItems:"center",gap:"5px"}}>
                ⬇ Download ZIP
              </button>
            )}
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",padding:"0 18px",borderBottom:"1px solid #0f1322",background:"#080b14"}}>
          {[["preview","🌐 Preview"],["code","</> Code"]].map(([t,label])=>(
            <button key={t} onClick={()=>setTab(t)} style={{padding:"9px 16px",background:"transparent",border:"none",borderBottom:tab===t?"2px solid #6366f1":"2px solid transparent",color:tab===t?"#c4d4f0":"#2e3655",fontSize:"11.5px",fontWeight:tab===t?"600":"400",cursor:"pointer",marginBottom:"-1px",transition:"color .15s"}}>
              {label}
            </button>
          ))}
        </div>

        {/* Content */}
        <div style={{flex:1,position:"relative",overflow:"hidden"}}>
          {tab==="preview" ? (
            code
              ? <iframe style={{width:"100%",height:"100%",border:"none"}} src={iframeSrc} title="preview" sandbox="allow-scripts"/>
              : <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"12px",color:"#1e2535"}}>
                  <div style={{fontSize:"60px",opacity:.25,animation:"float 3s ease-in-out infinite"}}>🌐</div>
                  <div style={{fontSize:"15px",fontWeight:"600",color:"#334155"}}>Your website preview will appear here</div>
                  <div style={{fontSize:"12px",color:"#1e2535"}}>Describe what you want to build in the chat →</div>
                </div>
          ) : (
            <div style={{height:"100%",overflowY:"auto",background:"#060810"}}>
              {code
                ? <pre style={{margin:0,padding:"20px",fontSize:"11px",lineHeight:"1.85",color:"#5a7a9a",fontFamily:"'Fira Code',monospace",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{code}</pre>
                : <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"10px",color:"#1e2535"}}>
                    <div style={{fontSize:"48px",opacity:.2}}>📝</div>
                    <div style={{fontSize:"13px",color:"#334155"}}>No code generated yet</div>
                  </div>
              }
            </div>
          )}

          {generating && (
            <div style={{position:"absolute",inset:0,background:"rgba(6,8,16,0.9)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"16px",backdropFilter:"blur(8px)"}}>
              <div style={{width:"48px",height:"48px",borderRadius:"50%",border:"3px solid #1e2535",borderTop:"3px solid #6366f1",animation:"spin .8s linear infinite"}}/>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:"13px",color:"#64748b",marginBottom:"4px"}}>{status}</div>
                <div style={{fontSize:"11px",color:"#2e3655"}}>This usually takes 8–15 seconds</div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function Root() {
  const [view, setView]         = useState("home"); // "home" | "builder"
  const [initPrompt, setPrompt] = useState("");

  const goBuilder = (prompt) => {
    setPrompt(prompt);
    setView("builder");
  };

  return view === "home"
    ? <HomePage onStart={goBuilder}/>
    : <BuilderView initialPrompt={initPrompt} onGoHome={()=>setView("home")}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
